# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : openttd
version    : '15.3'
release    : 49
source     :
    - https://cdn.openttd.org/openttd-releases/15.3/openttd-15.3-source.tar.xz : 5ea21eea7d59c78a42071924ac18c6bc0116088f2e96b14cfee9369175973be7
homepage   : https://www.openttd.org/
license    : GPL-2.0-or-later
component  : games.strategy
summary    : OpenTTD is an open source simulation game based upon Transport Tycoon Deluxe
description: |
    OpenTTD is an open source simulation game based upon Transport Tycoon Deluxe
builddeps  :
    - pkgconfig(fluidsynth)
    - pkgconfig(fontconfig)
    - pkgconfig(gl)
    - pkgconfig(harfbuzz)
    - pkgconfig(icu-i18n)
    - pkgconfig(libcurl)
    - pkgconfig(liblzma)
    - pkgconfig(lzo2)
    - pkgconfig(opusfile)
    - pkgconfig(sdl2)
setup      : |
    %cmake_ninja \
        -DCMAKE_INSTALL_BINDIR=bin \
        -DCMAKE_INSTALL_DATADIR=share/openttd
build      : |
    %ninja_build
install    : |
    %ninja_install
    install -Dm00644 $pkgfiles/org.openttd.OpenTTD.metainfo.xml -t $installdir/usr/share/metainfo/
