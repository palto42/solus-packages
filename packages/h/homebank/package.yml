# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : homebank
version    : '5.10'
release    : 42
source     :
    - https://www.gethomebank.org/public/sources/homebank-5.10.tar.gz : 783fd8bb2ebba09713e5d7c183d454f4a4393e828af5763f768b48afabc54386
homepage   : https://www.gethomebank.org/en/index.php
license    : GPL-2.0-or-later
component  : office.finance
