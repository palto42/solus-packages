# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hunspell-en
version    : 2026.02.25
release    : 8
source     :
    - https://sourceforge.net/projects/wordlist/files/speller/2026.02.25/hunspell-en_GB-large-2026.02.25.zip : 704a49438a3a9d4f11cd76db433a6b230b9ce8770ee13fa28700052c4517ddc1
    - https://sourceforge.net/projects/wordlist/files/speller/2026.02.25/hunspell-en_US-2026.02.25.zip : ac8e73310e951d88c52c2cf2ba54ceaca34f8486a81630ac8a75dc5f931179f9
    - https://sourceforge.net/projects/wordlist/files/speller/2026.02.25/hunspell-en_CA-2026.02.25.zip : 29fe0050408c35614f22bea84338b4256962c89f5ef25dac5038325bcb86f424
homepage   : https://sourceforge.net/projects/wordlist/
license    : BSD-3-Clause
component  : office.spelling
summary    : English hunspell dictionaries
description: |
    English hunspell dictionaries
rundeps    :
    - libhunspell
setup      : |
    unzip $sources/hunspell-en_US-$version.zip
    unzip $sources/hunspell-en_CA-$version.zip
install    : |
    install -D -d -m 00755 $installdir/usr/share/hunspell
    install -m 00644 en_*.dic en_*.aff $installdir/usr/share/hunspell

    pushd $installdir/usr/share/hunspell/
    en_GB_aliases="en_AG en_AU en_BS en_BW en_BZ en_DK en_GB en_GH en_HK en_IE en_IN en_JM en_NA en_NG en_NZ en_SG en_TT en_ZA en_ZW"
    for lang in $en_GB_aliases; do
        ln -s en_GB-large.aff $lang.aff
        ln -s en_GB-large.dic $lang.dic
    done
    ln -s en_US.aff en_PH.aff
    ln -s en_US.dic en_PH.dic
    popd
    # The joy of zip sources
    chmod 00644 $installdir/usr/share/hunspell/*.{aff,dic}

    # License, common readme for all three dictionaries
    install -Dm0644 $workdir/README_en_GB-large.txt $in:stalldir/usr/share/license/hunspell-en/README
    
