# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hnterm
version    : 0.4
release    : 2
source     :
    # Commit date 2024-08-07
    - git|https://github.com/ggerganov/hnterm.git : 9d09b1764f129f61b3a8ef7a6de55c23777f36c2
homepage   : https://hnterm.ggerganov.com/
license    : MIT
component  : network.news
summary    : Hacker News in the terminal
description: |
    Browse Hacker News interactively in your terminal.
builddeps  :
    - pkgconfig(libcurl)
    - git
setup      : |
    %cmake
build      : |
    %make
install    : |
    install -Dm00755 bin/hnterm $installdir/usr/bin/hnterm
    %install_license LICENSE
