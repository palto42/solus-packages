# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : htop
version    : 3.5.1
release    : 28
source     :
    - https://github.com/htop-dev/htop/releases/download/3.5.1/htop-3.5.1.tar.xz : 526cecd62870aa8d14d2a79a35ea197e4e2b5317d275b567cee0574b2ddb2e9a
homepage   : https://htop.dev
license    : GPL-2.0-or-later
component  : system.utils
summary    : htop (interactive process viewer for Linux)
description: |
    htop is an interactive process viewer for Linux.
builddeps  :
    - lm_sensors-devel
rundeps    :
    - lm_sensors
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
    install -Dm00644 $pkgfiles/htop.metainfo.xml -t $installdir/usr/share/metainfo
