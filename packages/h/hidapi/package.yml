# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hidapi
version    : 0.15.0
release    : 10
source     :
    - https://github.com/libusb/hidapi/archive/refs/tags/hidapi-0.15.0.tar.gz : 5d84dec684c27b97b921d2f3b73218cb773cf4ea915caee317ac8fc73cef8136
license    :
    - BSD-3-Clause
    - HIDAPI
    - GPL-3.0-or-later
component  : programming
homepage   : https://github.com/libusb/hidapi/
summary    : Simple library for communicating with USB and Bluetooth HID devices
description: |
    Simple library for communicating with USB and Bluetooth HID devices on Linux, Mac, and Windows.
builddeps  :
    - pkgconfig32(libudev)
    - pkgconfig32(libusb-1.0)
emul32     : true
clang      : true
setup      : |
    %cmake_ninja -DCMAKE_INSTALL_LIBDIR=lib%LIBSUFFIX%
build      : |
    %ninja_build
install    : |
    %ninja_install
    
    %install_license LICENSE-bsd.txt LICENSE-gpl3.txt LICENSE-orig.txt
