# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : newsboat
version    : '2.43'
release    : 10
source     :
    - https://github.com/newsboat/newsboat/archive/refs/tags/r2.43.tar.gz : c5cebe4e81e79fece453745b4eae6c6f5fb87b24979b83edf629ac21d5f350e6
homepage   : https://newsboat.org/
license    : MIT
component  : network.news
summary    : RSS/Atom feed reader for the text console
description: |
    Newsboat is an RSS/Atom feed reader for the text console. It's an actively maintained fork of Newsbeuter.
networking : true
builddeps  :
    - pkgconfig(json-c)
    - pkgconfig(libcurl)
    - pkgconfig(libxml-2.0)
    - pkgconfig(sqlite3)
    - pkgconfig(stfl)
    - asciidoctor
    - gawk
    - gettext
    - rust
setup      : |
    ./config.sh
build      : |
    %make prefix=/usr
install    : |
    %make_install prefix=/usr
    %install_license LICENSE
