# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : re2c
version    : 4.5.1
release    : 12
homepage   : https://re2c.org/
source     :
    - https://github.com/skvadrik/re2c/releases/download/4.5.1/re2c-4.5.1.tar.lz : af85de20a6d780f2ef345eac81b35786eded075dc468384f79a65ad1059dc50d
license    : Public-Domain
component  : programming.tools
