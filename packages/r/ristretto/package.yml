# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ristretto
version    : 0.14.0
release    : 5
source     :
    - https://archive.xfce.org/src/apps/ristretto/0.14/ristretto-0.14.0.tar.xz : 502cf1577de14b38132dc89e56884c5e10f86f6a028d8dde379a8839110fda55
homepage   : https://docs.xfce.org/apps/ristretto/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : A fast and lightweight picture viewer for Xfce.
description: |
    A fast and lightweight picture viewer for Xfce.
builddeps  :
    - pkgconfig(exo-2)
    - pkgconfig(libexif)
    - pkgconfig(libxfce4ui-2)
    - pkgconfig(libxfconf-0)
    - pkgconfig(tumbler-1)
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
