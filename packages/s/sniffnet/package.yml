# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : sniffnet
version    : 1.5.0
release    : 6
source     :
    - https://github.com/GyulyVGC/sniffnet/archive/refs/tags/v1.5.0.tar.gz : c2000ee833c8329d5aaf2b4c1f950d01b48b2a93bd094f949dbed5d6ac4f4d8c
homepage   : https://sniffnet.net/
license    :
    - Apache-2.0
    - MIT
component  : network.util
summary    : Comfortably monitor your Internet traffic.
description: |
    Sniffnet is a network monitoring tool to help you easily keep track of your Internet traffic. Whether you want to gather statistics, you’re curious to see who you are exchanging data with, or you need to inspect more in depth what's going on in your network, this app will get you covered.
networking : true
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(libpcap)
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install

    install -D -m 00644 $workdir/resources/logos/raw/icon.svg $installdir/usr/share/icons/hicolor/scalable/apps/sniffnet.svg
    install -D -m 00644 $workdir/resources/packaging/linux/sniffnet.desktop $installdir/usr/share/applications/net.sniffnet.sniffnet.desktop
    install -D -m 00644 $pkgfiles/net.sniffnet.sniffnet.metainfo.xml $installdir/usr/share/metainfo/net.sniffnet.sniffnet.metainfo.xml
    setcap cap_net_raw,cap_net_admin=eip $installdir/usr/bin/sniffnet

    %install_license LICENSE-APACHE LICENSE-MIT
