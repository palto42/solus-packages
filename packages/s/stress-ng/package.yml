# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : stress-ng
version    : 0.21.00
release    : 18
source     :
    - https://github.com/ColinIanKing/stress-ng/archive/refs/tags/V0.21.00.tar.gz : 1339cbc6ccbff7e2ee2177bf0fd67e7b94e8ff7b07fe89bcfaec0280d800cf34
license    : GPL-2.0-or-later
component  : system.utils
homepage   : https://github.com/ColinIanKing/stress-ng
summary    : Multi-option stress test utility
description: |
    stress-ng will stress test a computer system in various selectable ways. It was designed to exercise various physical subsystems of a computer as well as the various operating system kernel interfaces.
clang      : true
builddeps  :
    # See https://github.com/ColinIanKing/stress-ng?tab=readme-ov-file#building-stress-ng
    - pkgconfig(eigen3)
    - pkgconfig(gbm)
    - pkgconfig(keyutils)
    - pkgconfig(libacl)
    - pkgconfig(libapparmor)
    - pkgconfig(libbsd)
    - pkgconfig(libcap)
    - pkgconfig(libglvnd)
    - pkgconfig(libjpeg)
    - pkgconfig(libmd)
    - pkgconfig(libxcrypt)
    - pkgconfig(libxxhash)
    - pkgconfig(mpfr)
    - libaio-devel
optimize   :
    - thin-lto
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
