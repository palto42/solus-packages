# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : snapshot
version    : '50.0'
release    : 12
source     :
    - https://download.gnome.org/sources/snapshot/50/snapshot-50.0.tar.xz : ec9daf9883eb90330911bb51e6b69eed8c9dbdd5438e864adc90ee55a5fe9eed
homepage   : https://apps.gnome.org/Snapshot/
license    : GPL-3.0-or-later
component  : desktop.gnome
summary    : Take pictures and videos
description: |
    Take pictures and videos on your computer, tablet, or phone.
builddeps  :
    - pkgconfig(glycin-gtk4-2)
    - pkgconfig(gstreamer-plugins-bad-1.0)
    - pkgconfig(lcms2)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libseccomp)
    - desktop-file-utils
    - rust
rundeps    :
    - gstreamer-plugin-gtk4
    - gstreamer-plugin-pipewire
    - gstreamer-plugins-good
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
