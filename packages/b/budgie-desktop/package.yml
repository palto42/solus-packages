# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : budgie-desktop
version    : 10.9.4
release    : 283
source     :
    - https://github.com/BuddiesOfBudgie/budgie-desktop/releases/download/v10.9.4/budgie-desktop-v10.9.4.tar.xz : 0d1899ecad0051ef54f587b097add678ecb535b0de5e93e4fdfa23da6c557852
    - git|https://gitlab.gnome.org/GNOME/libgnome-volume-control.git : d2442f455844e5292cb4a74ffc66ecc8d7595a9f
homepage   : https://blog.buddiesofbudgie.org
license    :
    - GPL-2.0-only
    - LGPL-2.1-only
summary    : A luxurious home computing experience
description: |
    Budgie Desktop is a modern desktop environment developed by the Buddies of Budgie.
component  : desktop.budgie
builddeps  :
    - pkgconfig(accountsservice)
    - pkgconfig(alsa)
    - pkgconfig(gee-0.8)
    - pkgconfig(gnome-desktop-3.0)
    - pkgconfig(gnome-settings-daemon)
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(gtk-doc)
    - pkgconfig(ibus-1.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libcanberra)
    - pkgconfig(libmagpie-0)
    - pkgconfig(libnotify)
    - pkgconfig(libpeas-2)
    - pkgconfig(libpulse-mainloop-glib)
    - pkgconfig(libwacom)
    - pkgconfig(libwnck-3.0)
    - pkgconfig(libxfce4windowing-0)
    - pkgconfig(upower-glib)
    - budgie-screensaver # Required at configure time to ensure we have a proper configuration of budgie-desktop
    - sassc
    - vala
rundeps    :
    - budgie-control-center
    - budgie-screensaver
    - budgie-session
    - gnome-settings-daemon
    - network-manager-applet
    - pipewire
    - switcheroo-control
    - xdg-desktop-portal-gtk
    - xdotool
setup      : |
    %patch -p1 -i $pkgfiles/0001-panel-plugin-manager-Don-t-free-object-owned-by-hash.patch
    %patch -p1 -i $pkgfiles/libxfce4windowing-4.20.4.patch

    # Fix https://github.com/getsolus/packages/issues/8302
    rm -vrf subprojects/gvc
    cp -r ${sources}/libgnome-volume-control.git subprojects/gvc

    %meson_configure \
        -Dwith-stateless=true \
        -Dbsd-libexecdir="%libdir%/gnome-settings-daemon"
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE LICENSE.*

    # Stateless XDG
    mv $installdir/etc/xdg/autostart/* $installdir/usr/share/xdg/autostart/
    rmdir $installdir/etc/xdg/autostart
    rmdir $installdir/etc/xdg/
    rmdir $installdir/etc
