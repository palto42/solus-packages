    - https://gitlab.com/drobilla/zix/-/archive/v0.8.0/zix-v0.8.0.tar.gz : 51d70d63e970214db84e32d55377d84090c02145f5768265ab140d117f2b8e24
homepage   : https://gitlab.com/drobilla/zix
license    :
    - 0BSD
    - ISC
