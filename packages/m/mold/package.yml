# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mold
version    : 2.41.0
release    : 24
source     :
    - https://github.com/rui314/mold/archive/refs/tags/v2.41.0.tar.gz : 0a61abac85d818437b425df856822e9d6e9982baeae5a93bcb02fe6c0060c61a
homepage   : https://github.com/rui314/mold
license    : MIT
component  : programming.tools
summary    : A modern linker
description: |
    mold is a faster drop-in replacement for existing Unix linkers. mold is created for increasing developer productivity by reducing build time especially in rapid debug-edit-rebuild cycles.
avx2       : true
lto        : true
clang      : true
builddeps  :
    - pkgconfig(libblake3)
    - pkgconfig(libzstd)
    - pkgconfig(mimalloc)
    - pkgconfig(tbb)
    - mold
setup      : |
    %patch -p1 -i $pkgfiles/0001-solus-Set-default-settings-for-compression-and-build.patch

    %cmake_ninja -DMOLD_LTO=ON \
                 -DMOLD_MOSTLY_STATIC=OFF \
                 -DMOLD_USE_MIMALLOC=ON \
                 -DMOLD_USE_SYSTEM_MIMALLOC=ON \
                 -DMOLD_USE_SYSTEM_TBB=ON \
                 -DMOLD_USE_MOLD=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
