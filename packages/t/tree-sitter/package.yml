# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tree-sitter
version    : 0.26.8
release    : 21
source     :
    - https://github.com/tree-sitter/tree-sitter/archive/refs/tags/v0.26.8.tar.gz : e6826b7533ec3a885aba598377a6d20b5a6321ff3db76968e960c2352d3a5077
license    : MIT
component  : 
    - programming.library
    - cli: programming.tools
homepage   : https://tree-sitter.github.io
summary    :
    - An incremental parsing system for programming tools
    - cli: CLI tool for developing, testing, and using Tree-sitter parsers
description: |
    Tree-sitter is a parser generator tool and an incremental parsing library.
networking : true
optimize   :
    - lto
    - speed
builddeps  :
    - rust
setup      : |
    %cargo_fetch
    %cmake_ninja
build      : |
    %ninja_build
    %cargo_build -p tree-sitter-cli
install    : |
    %ninja_install
    # rm -v $installdir/%libdir%/libtree-sitter.a
    install -Dm00755 target/release/tree-sitter -t $installdir/usr/bin
    %install_license LICENSE
patterns   :
    - cli:
        - /usr/bin
