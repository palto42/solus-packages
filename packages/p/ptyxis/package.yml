# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ptyxis
version    : '50.1'
release    : 11
source     :
    - https://download.gnome.org/sources/ptyxis/50/ptyxis-50.1.tar.xz : 73f4b76480644b2840415859a51d20cd7487b0619714f8defcd38212c3ddcffe
homepage   : https://devsuite.app/ptyxis/
license    : GPL-3.0-or-later
component  : desktop.gnome
summary    : A terminal for a container-oriented desktop
description: |
    Ptyxis is a terminal for GNOME that focuses on ease-of-use in a world of containers.
builddeps  :
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libportal-gtk4)
    - pkgconfig(vte-2.91)
    - desktop-file-utils
setup      : |
    %meson_configure -Dgeneric=terminal
build      : |
    %ninja_build
install    : |
    %ninja_install
