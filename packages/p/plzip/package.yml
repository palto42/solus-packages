# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plzip
version    : '1.13'
release    : 2
source     :
    - https://download.savannah.nongnu.org/releases/lzip/plzip/plzip-1.13.tar.gz : 64d49dde20daa5fdff2b3ff28e3348082de10dd54eb10df6da7d1bc6c7a6db64
homepage   : https://www.nongnu.org/lzip/plzip.html
license    : GPL-2.0-or-later
component  : system.utils
summary    : Plzip is a massively parallel (multi-threaded) implementation of lzip
description: |
    Plzip is a massively parallel (multi-threaded) implementation of lzip, compatible with lzip 1.4 or newer. Plzip uses the compression library lzlib.
builddeps  :
    - lzlib-devel
setup      : |
    %configure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
