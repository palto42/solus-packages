# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : perl-dbi
version    : '1.647'
release    : 16
source     :
    - https://cpan.metacpan.org/authors/id/H/HM/HMBRAND/DBI-1.647.tgz : 0df16af8e5b3225a68b7b592ab531004ddb35a9682b50300ce50174ad867d9aa
homepage   : https://metacpan.org/pod/DBI
license    : Artistic-1.0-Perl
component  : programming.perl
summary    : Database independent interface for Perl
description: |
    The DBI is the standard database interface module for Perl. It defines a set of methods, variables and conventions that provide a consistent database interface independent of the actual database being used.
setup      : |
    %perl_setup
build      : |
    %perl_build
install    : |
    %perl_install
    %install_license LICENSE
check      : |
    %perl_build test #TEST_VERBOSE=1
patterns   : /*
