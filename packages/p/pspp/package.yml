# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pspp
version    : 2.1.1
release    : 14
source     :
    - https://ftpmirror.gnu.org/gnu/pspp/pspp-2.1.1.tar.gz : b5e550937bdfa66a1e6ca729195272e8e5e66b3e04686b2d83fb2e66d4ef14c3
homepage   : https://www.gnu.org/software/pspp/
license    : GPL-3.0-or-later
component  : office.maths
summary    : Statistical analysis program
description: |
    A free and open source alternative to the proprietary (and expensive) statistical analysis software, SPSS, by IBM. Published by the Free Software Foundation.
builddeps  :
    - pkgconfig(gsl)
    - pkgconfig(gtksourceview-4)
    - pkgconfig(libpng)
    - pkgconfig(spread-sheet-widget)
    - gettext-devel
setup      : |
    # See http://savannah.gnu.org/bugs/?65892, remove all .png related docs
    %patch -p1 -i $pkgfiles/disable-png.patch

    # Fix buildm thanks Arch
    sed -i 's/.*_GL_EXTERN_C.*bsearch.*/#undef bsearch\n&/' gl/stdlib.in.h
    sed -i 's/.*_GL_EXTERN_C.*wmemchr.*/#undef wmemchr\n&/' gl/wchar.in.h

    # FIXME: reconfigure macro doesn't pick up -I
    autoreconf -vfi -I /usr/share/gettext/m4
    %configure --disable-static
build      : |
    %make
install    : |
    %make_install
