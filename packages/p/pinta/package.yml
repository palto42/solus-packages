# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : pinta
version    : 3.1.2
homepage   : https://www.pinta-project.com/
release    : 27
source     :
    - https://github.com/PintaProject/Pinta/releases/download/3.1.2/pinta-3.1.2.tar.gz : 27f55a026b51f6f18197e6bcfdd7c79544e41529d166daf6c93a1117e9ed45f0
license    : MIT
component  : multimedia.graphics
summary    : Pinta Painting Made Simple
description: |
    Pinta is a free, open source drawing/editing program modeled after Paint.NET. Its goal is to provide users with a simple yet powerful way to draw and manipulate images on Linux, Mac, Windows, and *BSD.
libsplit   : false
networking : true
builddeps  :
    - pkgconfig(libadwaita-1)
    - autoconf-archive
    - dotnet-sdk
    - gettext-devel
    - intltool
rundeps    :
    - dotnet
    - libadwaita
environment: |
    export DOTNET_TARGET_FRAMEWORK="net10"
setup      : |
    %patch -p1 -i $pkgfiles/0002-force-x11-compat.patch
    %reconfigure
build      : |
    %make
install    : |
    %make_install
    %install_license license-mit.txt license-pdn.txt
check      : |
    %make check
patterns   :
    - /*
