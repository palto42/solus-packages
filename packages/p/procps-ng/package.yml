# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : procps-ng
version    : 4.0.6
release    : 17
source     :
    - https://sourceforge.net/projects/procps-ng/files/Production/procps-ng-4.0.6.tar.xz : 67bea6fbc3a42a535a0230c9e891e5ddfb4d9d39422d46565a2990d1ace15216
homepage   : https://gitlab.com/procps-ng/procps
license    : GPL-2.0-or-later
summary    : /proc file system utilities
component  : system.base
description: |
    This project provides command line and full screen utilities for browsing procfs, a "pseudo" file system dynamically generated by the kernel to provide information about the status of entries in its process table (such as whether the process is running, stopped, or a "zombie").
setup      : |
    %configure --exec-prefix= \
               --disable-static\
               --disable-skill\
               --disable-kill \
               --disable-modern-top \
               --enable-watch8bit \
               --with-systemd
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING

    # Empty
    find $installdir -type d -empty -delete
