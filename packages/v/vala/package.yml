# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : vala
version    : 0.56.19
release    : 76
source     :
    - https://download.gnome.org/sources/vala/0.56/vala-0.56.19.tar.xz : 5ad7cbbfcc0de61b403d6797c9ef60455bfbebd8e162aec33b5b0b097adfb9d5
homepage   : https://vala.dev/
component  :
    - ^libvala : programming.library
    - ^libvala-devel : programming.devel
    - ^vala-docs : programming.docs
    - ^valadoc : programming.tools
    - ^valadoc-devel : programming.devel
    - programming
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
summary    :
    - ^libvala : Vala libraries
    - ^libvala-devel : Vala development files
    - ^vala-docs : Documentation for Vala
    - ^valadoc : Vala Documentation Tool
    - ^valadoc-devel : Valadoc development files
    - Vala is a programming language using modern high level abstractions without imposing additional runtime requirements and without using a different ABI compared to applications and libraries written in C.
description:
    - ^libvala : Vala libraries
    - ^libvala-devel : Vala development files
    - ^vala-docs : Documentation for Vala
    - ^valadoc : Vala Documentation Tool
    - ^valadoc-devel : Valadoc development files
    - Vala is a programming language using modern high level abstractions without imposing additional runtime requirements and without using a different ABI compared to applications and libraries written in C.
builddeps  :
    - pkgconfig(libgvc)
    - help2man
rundeps    :
    - ^vala-docs : vala
    - libvala-devel
setup      : |
    %configure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
patterns   :
    - ^libvala :
        - /usr/lib64/libvala-*.so.*
    - ^libvala-devel :
        - /usr/include
        - /usr/lib64/libvala-*.so
        - /usr/lib64/pkgconfig
        - /usr/share/pkgconfig
        - /usr/share/aclocal
    - ^vala-docs :
        - /usr/share/doc
        - /usr/share/devhelp
    - ^valadoc :
        - /usr/bin/valadoc*
        - /usr/lib64/valadoc-*
        - /usr/lib64/libvaladoc*.so.*
        - /usr/share/man/man1/valadoc*
        - /usr/share/valadoc*
    - ^valadoc-devel :
        - /usr/include/valadoc-*
        - /usr/lib64/libvaladoc*.so
        - /usr/lib64/pkgconfig/valadoc-*.pc
        - /usr/share/vala/vapi/valadoc*
    - /usr/lib64/vala-*
    - /usr/share/vala
    - /usr/share/vala-*
    - /usr/share/man/vala*
