# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : verilator
version    : '5.048'
release    : 55
source     :
    - https://github.com/verilator/verilator/archive/refs/tags/v5.048.tar.gz : 02d934b3f972c6d9b792350634d81eadfc9e61f347e3f3bdcaad40960b9fcb53
license    :
    - Artistic-2.0
    - LGPL-3.0-only
homepage   : https://www.veripool.org/wiki/verilator
component  : programming.tools
summary    : Verilator converts synthesizable (generally not behavioral) Verilog code into C++ or SystemC code.
description: |
    Verilator converts synthesizable (generally not behavioral) Verilog code into C++ or SystemC code. It is not a complete simulator, just a translator.
builddeps  :
    - help2man
rundeps    :
    - ccache
checkdeps  :
    - python-distro
setup      : |
    autoconf
    %configure
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE LICENSES/*
check      : |
    make test
