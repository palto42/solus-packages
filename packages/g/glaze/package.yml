# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : glaze
version    : 7.3.3
release    : 8
source     :
    - https://github.com/stephenberry/glaze/archive/refs/tags/v7.3.3.tar.gz : 41c8184a4fc4ab4df92b9bdde9ff85c9c47ef8f7a0fe3972db369574ac130d3a
homepage   : https://github.com/stephenberry/glaze
license    : MIT
component  : programming.library
summary    : Extremely fast, in memory, JSON and interface library for modern C++
description: |
    Extremely fast, in memory, JSON and interface library for modern C++
networking : true
builddeps  :
    - git
patterns   :
    - /usr/*
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    # Remove a failing test
    sed -i '/openapi_test/d' tests/networking_tests/CMakeLists.txt
    sed -i '/http_client_test/d' tests/networking_tests/CMakeLists.txt

    %ninja_check
