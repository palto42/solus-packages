# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gifski
version    : 1.34.0
release    : 18
source     :
    - https://github.com/ImageOptim/gifski/archive/refs/tags/1.34.0.tar.gz : c9711473615cb20d7754e8296621cdd95cc068cb04b640f391cd71f8787b692c
homepage   : https://gif.ski/
license    : AGPL-3.0-or-later
component  : multimedia.library
summary    : GIF encoder based on libimagequant
description: |
    gifski converts video frames to GIF animations using pngquant's fancy features for efficient cross-frame palettes and temporal dithering. It produces animated GIFs that use thousands of colors per frame.
networking : true
clang      : true
builddeps  :
    - pkgconfig(libavutil)
    - rust
setup      : |
    %patch -p1 -i $pkgfiles/ffmpeg-8.patch
    cargo update
    %cargo_fetch
build      : |
    %cargo_build --features=video
install    : |
    %cargo_install
