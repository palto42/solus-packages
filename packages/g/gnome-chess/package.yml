# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnome-chess
version    : '50.0'
release    : 39
source     :
    - https://download.gnome.org/sources/gnome-chess/50/gnome-chess-50.0.tar.xz : a2dbe7c613b46729141747e28bb0cb8614e57de156d3b9dda6ace8b0146a5bfc
homepage   : https://gitlab.gnome.org/GNOME/gnome-chess
license    : GPL-2.0-or-later
component  : games.strategy
summary    : GNOME Chess Game
description: |
    GNOME Chess is a 2D chess game, where games can be played between a combination of human and computer players. GNOME Chess detects known third party chess engines for computer players.
optimize   :
    - lto
builddeps  :
    - pkgconfig(glu)
    - pkgconfig(libadwaita-1)
    - pkgconfig(librsvg-2.0)
    - desktop-file-utils
    - itstool
    - vala
rundeps    :
    - gnuchess
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
