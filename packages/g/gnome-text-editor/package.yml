# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnome-text-editor
version    : '50.0'
release    : 17
source     :
    - https://download.gnome.org/sources/gnome-text-editor/50/gnome-text-editor-50.0.tar.xz : 9dc299da4daa085423b5d48db59f0021ad55e74143a5cb8ab2e5ffe17967f45b
homepage   : https://apps.gnome.org/TextEditor/
license    : GPL-3.0-or-later
component  : desktop.gnome
summary    : A simple text editor for the GNOME desktop.
description: |
    GNOME Text Editor is a simple text editor focused on a pleasing default experience.
optimize   :
    - lto
builddeps  :
    - pkgconfig(editorconfig)
    - pkgconfig(gtk4)
    - pkgconfig(gtksourceview-5)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libspelling-1)
    - desktop-file-utils
    - itstool
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
