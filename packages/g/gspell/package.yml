# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gspell
version    : 1.14.3
release    : 34
source     :
    - https://download.gnome.org/sources/gspell/1.14/gspell-1.14.3.tar.xz : e8b39c67556f75495362952f81ca241b5a3c17c75960b77fc93fa702c612a5a4
homepage   : https://gitlab.gnome.org/GNOME/gspell
license    : LGPL-2.1-or-later
component  : desktop.gnome.core
summary    : GTK+ Spell Checker Library
description: |
    GTK+ Spell Checker Library
optimize   :
    - lto
builddeps  :
    - pkgconfig(enchant-2)
    - pkgconfig(gobject-2.0)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(icu-i18n)
    - gtk-doc
    - vala
setup      : |
    %meson_configure -Dinstall_tests=false
build      : |
    %ninja_build
install    : |
    %ninja_install
