# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gpu-screen-recorder
version    : 5.13.3
release    : 3
source     :
    - https://dec05eba.com/snapshot/gpu-screen-recorder.git.5.13.3.tar.gz : 9f981f709e9410eab4eb75bb0657a5f0eb7dc2912010cdc49d30020a627bac7b
homepage   : https://git.dec05eba.com/gpu-screen-recorder/about/
license    : GPL-3.0-only
component  : multimedia.video
summary    : A shadowplay-like screen recorder for Linux. The fastest screen recorder for Linux.
description: |
    This is a screen recorder that has minimal impact on system performance by recording your monitor using the GPU only, similar to shadowplay on windows. This is the fastest screen recording tool for Linux.
clang      : true
builddeps  :
    - pkgconfig(dbus-1)
    - pkgconfig(libavcodec)
    - pkgconfig(libcap)
    - pkgconfig(libdrm)
    - pkgconfig(libglvnd)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(libpulse)
    - pkgconfig(libva)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-client)
    - pkgconfig(x11)
    - pkgconfig(xcomposite)
    - pkgconfig(xdamage)
    - pkgconfig(xrandr)

setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
