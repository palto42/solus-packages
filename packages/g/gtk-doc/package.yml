# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gtk-doc
version    : 1.36.1
release    : 19
source     :
    - https://download.gnome.org/sources/gtk-doc/1.36/gtk-doc-1.36.1.tar.xz : 0e517a5f97069831181be177516bde8aa8b3922398f2bdb09e265d22aecadbc5
homepage   : https://www.gtk.org/gtk-doc/
license    : GPL-2.0-or-later
component  : desktop.gnome.doc
summary    : GTK API Documentation generator
description: |
    GTK-Doc is a project which was started to generate API documentation from comments added to C code. It is typically used to document the public API of GTK+ and GNOME libraries, but it can also be used to document application code.
builddeps  :
    - pkgconfig(python3)
    - docbook-xml
    - itstool
    - pygments
    - python-parameterized
rundeps    :
    - docbook-xml
    - pygments
    - python3
patterns   :
    - /usr/share/aclocal
    - /usr/share/pkgconfig
    - /usr/share/gtk-doc/data
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
