# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnome-characters
version    : '50.0'
release    : 16
source     :
    - https://download.gnome.org/sources/gnome-characters/50/gnome-characters-50.0.tar.xz : 4070734dd639b3094be467bb055a5461b2fc301cdfc9feddcb4a68f476ed5aad
homepage   : https://apps.gnome.org/Characters/
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
component  : office.spelling
summary    : Character map application
description: |
    Characters is a simple utility application to find and insert unusual characters. It allows you to quickly find the character you are looking for by searching for keywords. You can also browse characters by categories, such as Punctuation, Pictures, etc.
optimize   :
    - lto
builddeps  :
    - pkgconfig(gjs-1.0)
    - pkgconfig(libadwaita-1)
    - desktop-file-utils
    - libunistring-devel
rundeps    :
    - gjs
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
