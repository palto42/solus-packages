# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : ghostscript
version    : 10.07.0
release    : 28
source     :
    - https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10070/ghostscript-10.07.0.tar.xz : ddace4e1721f967a55039baff564840225e0baa1d4f5432247ca1ccd1473b7c1
homepage   : https://www.ghostscript.com/
license    : AGPL-3.0-or-later
component  : office
summary    : PostScript language and PDF interpreter
description: |
    Ghostscript is an interpreter for the PostScript language and for PDF. Many other software programs use it in order to convert documentation into various formats.
builddeps  :
    - pkgconfig(cups)
    - pkgconfig(dbus-1)
    - pkgconfig(fontconfig)
    - pkgconfig(freetype2)
    - pkgconfig(gl)
    - pkgconfig(glu)
    - pkgconfig(glut)
    - pkgconfig(jbig2dec)
    - pkgconfig(lcms2)
    - pkgconfig(libidn2)
    - pkgconfig(libjxl)
    - pkgconfig(libopenjp2)
    - pkgconfig(libpng)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libwebp)
    - pkgconfig(x11)
    - pkgconfig(xext)
    - pkgconfig(xt)
    - pkgconfig(zlib)
    - libpaper-devel
rundeps    :
    - poppler-data
setup      : |
    # Remove built-in versions of these so we can use the system versions
    rm -rf cups/libs expat freetype lcms2* libpng jpeg zlib tiff expat openjpeg jbig2dec windows

    # These are used for OCR and bloat the libs by a fair bit. Eventually we want to link against system libs instead
    rm -r tesseract leptonica

    # Remove internal CMaps (CMaps from poppler-data are used instead)
    rm -rf Resource/CMap

    %reconfigure \
        --disable-compile-inits \
        --enable-fontconfig \
        --enable-freetype \
        --with-fontpath=/usr/share/fonts/urw-base35 \
        --with-system-libtiff \
        --without-local-zlib \
        --without-versioned-path
build      : |
    %make
    %make so
install    : |
    %make_install
    %make soinstall DESTDIR=${installdir}

    mv ${installdir}/usr/bin/{gsc,gs}
    ln -srv ${installdir}/usr/bin/gs ${installdir}/usr/bin/ghostscript
    ln -srv ${installdir}/usr/share/man/man1/gs.1.gz ${installdir}/usr/share/man/man1/ghostscript.1

    # Remove obsolete lpr bsd/Unix-related files
    rm -rf ${installdir}/usr/bin/{lprsetup.sh,unix-lpr.sh}

    # Use the cMaps from poppler-data
    ln -srv ${installdir}/usr/share/poppler/cMap ${installdir}/usr/share/ghostscript/Resource/CMap
patterns   :
    - docs :
        - /usr/share/doc
