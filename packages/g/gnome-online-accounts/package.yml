# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnome-online-accounts
version    : 3.58.1
release    : 70
source     :
    - https://download.gnome.org/sources/gnome-online-accounts/3.58/gnome-online-accounts-3.58.1.tar.xz : 9ec1900cc51409c2067c07c828c10be06fe3bf68d2999bb72d7d5ed325ed9bbc
homepage   : https://gnome.pages.gitlab.gnome.org/gnome-online-accounts/
license    :
    - CC-BY-SA-4.0 # Icons
    - GPL-2.0-or-later
component  : desktop.gnome.core
summary    : The GNOME Online Accounts package contains a framework used to access the user's online accounts
description: |
    GNOME Online Accounts is a single sign-on framework for GNOME. It aims to provide a way for users to setup online accounts to be used by the core system and core applications only.
optimize   :
    - lto
builddeps  :
    - pkgconfig(gcr-4)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk4)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(krb5)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libkeyutils)
    - pkgconfig(libsecret-1)
    - pkgconfig(rest-1.0)
    - docbook-xml
    - vala
setup      : |
    %meson_configure -Ddocumentation=false -Dgoogle_files=true
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
