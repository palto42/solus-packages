# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gnome-session
version    : '50.0'
release    : 49
source     :
    - https://download.gnome.org/sources/gnome-session/50/gnome-session-50.0.tar.xz : be7708cd9d260e1ac183815313dbb620b1876ead5ba39ce7ea2e6dc7adbd7246
homepage   : https://gitlab.gnome.org/GNOME/gnome-session
license    : GPL-2.0-or-later
summary    :
    - Provides GNOME session core
    - shell : Runtime support for GNOME Shell Session.
    - shell-x11 : Enable support for GNOME x11 session (DEPRECATED)
description:
    - Provides GNOME session core
    - shell : Runtime support for GNOME Shell Session
    - shell-x11 : Enable support for GNOME x11 session (DEPRECATED)
component  :
    - desktop.gnome.core
    - shell : desktop.gnome
    - shell-x11 : desktop.gnome
builddeps  :
    - pkgconfig(gl)
    - pkgconfig(gnome-desktop-3.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(sm)
    - pkgconfig(upower-glib)
    - pkgconfig(xtrans)
    - pkgconfig(xtst)
    - docbook-xml
    - xmlto
rundeps    :
    - gsettings-desktop-schemas
    - gvfs
    - udisks
    - upower
    - xdg-user-dirs
    - xdg-user-dirs-gtk
    - xdg-utils
    - shell :
        - gnome-session
        - pipewire
        - xdg-desktop-portal-gnome
patterns   :
    - shell :
        - /usr/share/xdg-desktop-portal/gnome-portals.conf
        - /usr/share/wayland-sessions
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
