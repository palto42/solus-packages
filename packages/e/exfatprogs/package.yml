# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : exfatprogs
version    : 1.3.2
release    : 17
source     :
    - https://github.com/exfatprogs/exfatprogs/archive/refs/tags/1.3.2.tar.gz : 4b3e198a2b879da52254f9d4a68accff8001b7b4e5c1860d47ad232e03a2a2d0
homepage   : https://github.com/exfatprogs/exfatprogs
license    : GPL-2.0-or-later
component  : system.utils
summary    : exFAT filesystem userspace utilities
description: |
    exfatprogs are the official userspace utilities that contain all of the standard utilities for creating, fixing and debugging exFAT filesystems in Linux.
replaces   :
    - exfat-utils
setup      : |
    %autogen
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
