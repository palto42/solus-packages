# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-gobject
version    : 3.56.2
release    : 44
source     :
    - https://download.gnome.org/sources/pygobject/3.56/pygobject-3.56.2.tar.gz : b816098969544081de9eecedb94ad6ac59c77e4d571fe7051f18bebcec074313
homepage   : https://gnome.pages.gitlab.gnome.org/pygobject/
license    : LGPL-2.1-or-later
summary    : Python GObject bindings
description: |
    PyGObject provides Python bindings to the GObject class from GLib.
component  : programming.python
builddeps  :
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(py3cairo)
    - pkgconfig(python3)
    - meson-python
    - patchelf
    - python-build
    - python-installer
    - python-setuptools
    - python-wheel
rundeps    :
    - python-cairo
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
replaces   :
    - python3-gobject
    - devel : python3-gobject-devel
conflicts  :
    - devel :
        - python2-gobject-devel
