# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-requests
version    : 2.33.1
release    : 24
source     :
    - https://files.pythonhosted.org/packages/source/r/requests/requests-2.33.1.tar.gz : 18817f8c57c6263968bc123d237e3b8b08ac046f5456bd1e307ee8f4250d3517
homepage   : https://requests.readthedocs.io/en/latest/
license    : Apache-2.0
component  : programming.python
summary    : Python HTTP for Humans
description: |
    Requests allows you to send organic, grass-fed HTTP/1.1 requests, without the need for manual labor. There's no need to manually add query strings to your URLs, or to form-encode your POST data. Keep-alive and HTTP connection pooling are 100% automatic, thanks to urllib3.
builddeps  :
    - python-build
    - python-certifi
    - python-idna
    - python-installer
    - python-packaging
    - python-setuptools
    - python-urllib3
    - python-wheel
checkdeps  :
    - python-pytest
rundeps    :
    - python-certifi
    - python-charset-normalizer
    - python-idna
    - python-urllib3
build      : |
    %python3_setup
install    : |
    %python3_install
#check      : |
    # requires httpbin,mocker
    #python3_test pytest3
