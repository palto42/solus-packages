# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : dsp
version    : '2.0'
release    : 8
source     :
    - https://github.com/bmc0/dsp/archive/refs/tags/v2.0.tar.gz : 1da8e1d4a560535c511283838ea2a22e5199c0945e9bb938dce890bdcb67ca8e
license    :
    - ISC
    - LGPL-2.1
    - GPL-2.0
component  : multimedia.audio
homepage   : https://github.com/bmc0/dsp
summary    : An audio processing program with an interactive mode
description: |
    dsp is an audio processing program with an interactive mode
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(ao)
    - pkgconfig(fftw3)
    - pkgconfig(libavcodec)
    - pkgconfig(libpulse)
    - pkgconfig(mad)
    - pkgconfig(sndfile)
    - ladspa-devel
setup      : |
    # The default configure macro contains unsupported options
    ./configure --prefix=/usr --libdir=/lib64 --mandir=/share/man --datadir=/share
build      : |
    %make
install    : |
    %make_install
