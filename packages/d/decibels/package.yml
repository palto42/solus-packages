# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : decibels
version    : 49.6.1
release    : 5
source     :
    - https://download.gnome.org/sources/decibels/49/decibels-49.6.1.tar.xz : 9a67ba14df23517c849fcfdea764c73a241e59055299b125e98aeab2a7801ad5
homepage   : https://apps.gnome.org/Decibels/
license    : GPL-3.0-or-later
component  : multimedia.audio
summary    : Play audio files
description: |
    Decibels play audio files, shows the waveform of the track, adjust playback speed and easy seek controls.
builddeps  :
    - pkgconfig(gjs-1.0)
    - pkgconfig(libadwaita-1)
    - blueprint-compiler
    - desktop-file-utils
    - nodejs
    - typescript
rundeps    :
    - gjs
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
