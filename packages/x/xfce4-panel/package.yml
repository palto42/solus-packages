# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : xfce4-panel
version    : 4.20.7
release    : 22
source     :
    - https://archive.xfce.org/src/xfce/xfce4-panel/4.20/xfce4-panel-4.20.7.tar.bz2 : 696e3eff0b1b5bfa8ba90fd7afdea58f5b06e5547840a7443d11388f2fd578ea
homepage   : https://docs.xfce.org/xfce/xfce4-panel/start
license    : GPL-2.0-or-later
component  : desktop.xfce
summary    : Panel for the Xfce desktop environment.
description: |
    Panel for the Xfce desktop environment.
builddeps  :
    - pkgconfig(dbusmenu-gtk3-0.4)
    - pkgconfig(exo-2)
    - pkgconfig(garcon-gtk3-1)
    - pkgconfig(gtk-layer-shell-0)
    - pkgconfig(libwnck-3.0)
    - pkgconfig(libxfce4ui-2)
    - pkgconfig(libxfce4windowing-x11-0)
    - vala
    - xfce4-dev-tools
rundeps    :
    - network-manager-applet
setup      : |
    %patch -p1 -i $pkgfiles/0001-Use-Solus-defaults.patch
    %patch -p1 -i $pkgfiles/wayland-wrapper-Prevent-plugin-allocation-blocking.patch

    %meson_configure --sysconfdir=/usr/share
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING COPYING.*
