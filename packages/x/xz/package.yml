# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : xz
version    : 5.8.3
release    : 42
source     :
    - https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.xz : fff1ffcf2b0da84d308a14de513a1aa23d4e9aa3464d17e64b9714bfdd0bbfb6
homepage   : https://tukaani.org/xz/
license    :
    - 0BSD
    - GPL-2.0-or-later
component  : system.base
summary    : xz (Data compression software)
description: |
    XZ Utils is a free data compression software with high compression ratio. XZ Utils is the successor to LZMA.
optimize   :
    - lto
emul32     : true
setup      : |
    export CFLAGS="${CFLAGS} -D_FILE_OFFSET_BITS=64"
    %reconfigure --disable-rpath --disable-static
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING COPYING.*
profile    : |
    %make check
check      : |
    %make check
patterns   :
    - docs :
        - /usr/share/doc
