# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libopenshot-audio
version    : 0.6.0
release    : 18
source     :
    - https://github.com/OpenShot/libopenshot-audio/archive/refs/tags/v0.6.0.tar.gz : f4df0429db6efc8441817da23d2536fbfb198c723309698cd2de4cb0533afc26
homepage   : https://github.com/openshot/libopenshot-audio
license    : GPL-3.0-or-later
component  : multimedia.library
summary    : A high-quality audio editing and playback library used by libopenshot.
description: |
    A high-quality audio editing and playback library used by libopenshot.
builddeps  :
    - pkgconfig(alsa)
    - pkgconfig(freetype2)
    - pkgconfig(xcursor)
    - pkgconfig(xinerama)
    - pkgconfig(xrandr)
    - doxygen
setup      : |
    %cmake_ninja \
        -DENABLE_AUDIO_DOCS=OFF \
        -DLIB_SUFFIX=%LIBSUFFIX% .
build      : |
    %ninja_build
install    : |
    %ninja_install
patterns   :
    - devel :
        - /usr/bin/
        - /usr/share/man/
