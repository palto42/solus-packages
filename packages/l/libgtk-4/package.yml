# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgtk-4
version    : 4.22.2
release    : 58
source     :
    - https://download.gnome.org/sources/gtk/4.22/gtk-4.22.2.tar.xz : b1c987370a0c30780cde351bdbee02eef816728f1c1c2ec7c8093281c0709ee8
homepage   : https://www.gtk.org/
license    : LGPL-2.0-or-later
component  :
    - desktop.gtk
    - demos : desktop.gtk
    - icon-browser : desktop.gtk
summary    :
    - libgtk-4 contains the libraries used for creating graphical user interfaces and applications.
    - demos : Demonstrations of major GTK4 features.
    - icon-browser : Sample application to graphically search well known GTK4 icon names.
description:
    - libgtk-4 contains the libraries used for creating graphical user interfaces and applications.
    - demos : Demonstrations of major GTK4 features.
    - icon-browser : Sample application to graphically search well known GTK4 icon names.
optimize   :
    - lto
builddeps  :
    - pkgconfig(atk)
    - pkgconfig(cloudproviders)
    - pkgconfig(colord)
    - pkgconfig(cups)
    - pkgconfig(epoxy)
    - pkgconfig(graphene-1.0)
    - pkgconfig(gstreamer-player-1.0)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libavformat)
    - pkgconfig(libcrypt)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(pango)
    - pkgconfig(shaderc)
    - pkgconfig(tinysparql-3.0)
    - pkgconfig(vulkan)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xcomposite)
    - pkgconfig(xcursor)
    - pkgconfig(xdamage)
    - pkgconfig(xi)
    - pkgconfig(xinerama)
    - pkgconfig(xkbcommon)
    - pkgconfig(xrandr)
    - python-gobject
    - sassc
    - vulkan-headers
rundeps    :
    - devel :
        - vulkan-headers
setup      : |
    %meson_configure \
        -Dbuild-tests=false \
        -Dbuild-testsuite=false \
        -Dcloudproviders=enabled \
        -Dcolord=enabled \
        -Ddocumentation=false \
        -Dintrospection=enabled \
        -Dman-pages=false \
        -Doptimization=3 \
        -Dprint-cups=enabled \
        -Dtracker=enabled \
        -Dvulkan=enabled
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
patterns   :
    - demos :
        - /usr/bin/gtk4-demo*
        - /usr/bin/gtk4-node*
        - /usr/bin/gtk4-print*
        - /usr/bin/gtk4-widget*
        - /usr/bin/gtk4-icon-editor
        - /usr/share/applications/
        - /usr/share/glib-2.0/schemas/org.gtk.Demo4*
        - /usr/share/icons/hicolor/
        - /usr/share/metainfo/
