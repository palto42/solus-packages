# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libvte
version    : 0.84.0
release    : 84
source     :
    - https://download.gnome.org/sources/vte/0.84/vte-0.84.0.tar.xz : 0414e31583836aeb7878da25f67c515f7e8879917ecc37c92e26b83e8d8fc3e3
homepage   : https://gitlab.gnome.org/GNOME/vte
license    : LGPL-3.0-or-later
component  : desktop.library
summary    : The VTE package contains a termcap file implementation for terminal emulators.
description: |
    The VTE package contains a termcap file implementation for terminal emulators.
optimize   :
    - lto
builddeps  :
    - pkgconfig(gnutls)
    - pkgconfig(gtk+-3.0)
    - pkgconfig(gtk4)
    - pkgconfig(liblz4)
    - pkgconfig(libpcre2-8)
    - fast-float
    - gi-docgen
    - gperf
    - libiconv-devel
    - vala
rundeps    :
    - devel :
        - pcre2-devel
patterns   :
    - docs :
        - /usr/share/doc/*
setup      : |
    %meson_configure \
                     -Dapp=false \
                     -Ddocs=true \
                     -Dgtk4=true
build      : |
    %ninja_build
install    : |
    %ninja_install
    mkdir $installdir/usr/share/defaults/
    mv $installdir/etc/ $installdir/usr/share/defaults/
