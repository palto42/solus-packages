# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgcrypt
version    : 1.12.2
release    : 32
source     :
    - https://gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-1.12.2.tar.bz2 : 7ce33c2492221a0436f96a8500215e9f3e3dcb5fd26a757cd415e7a843babd5e
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : system.base
homepage   : https://gnupg.org/software/libgcrypt/index.html
summary    : GNU's basic cryptographic library
description: |
    Libgcrypt is GNU's basic cryptographic library.
emul32     : true
optimize   :
    - size
    - lto
patterns   :
    - devel : /usr/share/aclocal
builddeps  :
    - pkgconfig32(gpg-error)
setup      : |
    %configure --with-gpg-error-prefix=/usr \
               --enable-noexecstack
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING COPYING.LIB LICENSES
check      : |
    %make check
