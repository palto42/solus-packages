# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgweather
version    : 4.6.0
release    : 39
source     :
    - https://download.gnome.org/sources/libgweather/4.6/libgweather-4.6.0.tar.xz : 7f5d0e8c9685ef2ff46c2f3a57cae48d7bf3540b2d83921f889ef28e6a876788
homepage   : https://gnome.pages.gitlab.gnome.org/libgweather/
license    :
    - GPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.gnome.core
summary    : The libgweather package is a library used to access weather information from online services for numerous locations
description: |
    The libgweather package is a library used to access weather information from online services for numerous locations.
builddeps  :
    - pkgconfig(geocode-glib-2.0)
    - pkgconfig(gweather-locations)
    - pkgconfig(json-glib-1.0)
    - pkgconfig(libsoup-3.0)
    - pkgconfig(pygobject-3.0)
    - gtk-doc
    - vala
rundeps    :
    - gweather-locations
setup      : |
    %meson_configure -Dgtk_doc=false -Denable_vala=true
build      : |
    %ninja_build
install    : |
    %ninja_install
