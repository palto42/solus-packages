# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgsf
version    : 1.14.56
release    : 16
source     :
    - https://download.gnome.org/sources/libgsf/1.14/libgsf-1.14.56.tar.xz : 9d21d30df1d12feaf03e181afd6067f65e3048ab69cb6ad174a3c5b72b92d297
homepage   : https://gitlab.gnome.org/GNOME/libgsf
license    : LGPL-2.1-only
component  : desktop.library
summary    : Library providing I/O for structured file formats
description: |
    libgsf contains the library used for providing an extensible input/output abstraction layer for structured file formats within GNOME.
builddeps  :
    - pkgconfig(bzip2)
    - pkgconfig(gdk-pixbuf-2.0)
    - intltool
setup      : |
    %configure --disable-static
build      : |
    %make
install    : |
    %make_install
