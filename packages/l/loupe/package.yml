# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : loupe
version    : '50.0'
release    : 11
source     :
    - https://download.gnome.org/sources/loupe/50/loupe-50.0.tar.xz : 7ae4fbae5e19316aa640c56f80dc5a791448a62dd8f0ff06e29a58bad813a994
homepage   : https://apps.gnome.org/Loupe/
license    : GPL-3.0-or-later
component  : desktop.gnome
summary    : GNOME's default image viewer
description: |
    An image viewer application written with GTK 4, Libadwaita and Rust. Browse through your images and inspect their metadata with:
    - Fast GPU accelerated image rendering
    - Tiled rendering for vector graphics
    - Extendable and sandboxed image decoding
    - Accessible presentation of the most important metadata.
networking : true
builddeps  :
    - pkgconfig(gtk4)
    - pkgconfig(gweather4)
    - pkgconfig(lcms2)
    - pkgconfig(libadwaita-1)
    - pkgconfig(libseccomp)
    - desktop-file-utils
    - itstool
    - rust
rundeps    :
    - glycin
    - webp-pixbuf-loader
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
