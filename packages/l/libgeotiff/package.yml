# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libgeotiff
version    : 1.7.4
release    : 5
source     :
    - https://github.com/OSGeo/libgeotiff/releases/download/1.7.4/libgeotiff-1.7.4.tar.gz : c598d04fdf2ba25c4352844dafa81dde3f7fd968daa7ad131228cd91e9d3dc47
homepage   : https://github.com/OSGeo/libgeotiff/
license    :
    - BSD-3-Clause
    - MIT
component  : multimedia.library
summary    : A TIFF based interchange format for georeferenced raster imagery
description: |
    libgeotiff is designed to permit the extraction and parsing of the GeoTIFF Key directories, as well as definition and installation of GeoTIFF keys in new files.
builddeps  :
    - pkgconfig(libjpeg)
    - pkgconfig(libtiff-4)
    - pkgconfig(proj)
setup      : |
    %patch -p1 -i $pkgfiles/build-shared-library.patch
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    rm -rf $installdir/usr/doc
