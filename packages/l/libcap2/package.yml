# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libcap2
version    : '2.78'
release    : 18
source     :
    - https://mirrors.edge.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-2.78.tar.xz : 0d621e562fd932ccf67b9660fb018e468a683d7b827541df27813228c996bb11
homepage   : https://sites.google.com/site/fullycapable/
license    :
    - BSD-3-Clause
    - GPL-2.0-only
component  :
    - ^captree : system.util
    - system.base
summary    :
    - ^captree : Capability inspection utility
    - Library for getting and setting POSIX.1e capabilities
description:
    - ^captree : Capability inspection utility
    - Library for getting and setting POSIX.1e capabilities
emul32     : true
builddeps  :
    - pkgconfig32(libattr)
    - pkgconfig32(pam)
    - golang
    - linux-headers
setup      : |
    # Static linking broken
    sed -i Makefile -e '/\-C tests/d'
build      : |
    _extra_opts="GOLANG=no"

    if [[ -z "${EMUL32BUILD}" ]]; then
        _extra_opts="all"
    fi

    %make \
        BUILD_CC="${CC}" \
        CC="${CC}" \
        DYNAMIC=yes \
        KERNEL_HEADERS="/usr/include" \
        CGO_REQUIRED=1 \
        CGO_CFLAGS="${CFLAGS}" \
        CGO_LDFLAGS="${LDFLAGS}" \
        GO_BUILD_FLAGS="-buildmode=pie -a -v -x -ldflags='-compressdwarf=false -B gobuildid'" \
        ${_extra_opts}
install    : |
    %make_install RAISE_SETFCAP=no lib=lib%LIBSUFFIX% prefix=/usr
    %install_license License

    install -Dm00644 -t ${installdir}/usr/share/licenses/captree/ License

    if [[ -z "${EMUL32BUILD}" ]]; then
        install -d -m 00644 $installdir/usr/bin/
        ln -s /usr/sbin/getcap $installdir/usr/bin/getcap
        ln -s /usr/sbin/setcap $installdir/usr/bin/setcap
    fi

    # no static, thanks.
    rm $installdir/%libdir%/*.a -v
patterns   :
    - ^captree :
        - /usr/sbin/captree
        - /usr/share/licenses/captree/
        - /usr/share/man/man8/captree.8*
