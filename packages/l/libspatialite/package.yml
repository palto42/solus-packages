# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libspatialite
version    : 5.1.0
release    : 15
source     :
    - https://www.gaia-gis.it/gaia-sins/libspatialite-sources/libspatialite-5.1.0.tar.gz : 43be2dd349daffe016dd1400c5d11285828c22fea35ca5109f21f3ed50605080
homepage   : https://www.gaia-gis.it/fossil/libspatialite/
license    : MPL-1.1
component  : programming.library
summary    : A library extending the basic SQLite core in order to get a full fledged Spatial DBMS
description: |
    SpatiaLite is an open source library intended to extend the SQLite core to support fully fledged Spatial SQL capabilities.
builddeps  :
    - pkgconfig(geos)
    - pkgconfig(libxml-2.0)
    - pkgconfig(minizip)
    - pkgconfig(proj)
    - pkgconfig(rttopo)
setup      : |
    %configure_no_runstatedir \
                    --disable-static --disable-freexl
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
check      : |
    %make check || :
