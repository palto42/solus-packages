# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : liblcms2
version    : '2.19'
release    : 21
source     :
    - https://github.com/mm2/Little-CMS/archive/refs/tags/lcms2.19.tar.gz : 6acc3eb5fac194acc85331194133ad1d4a60419dad16b3bc225a7d27380a5b3a
homepage   : https://www.littlecms.com/
license    :
    - GPL-3.0-or-later
    - MIT
component  :
    - desktop.core
    - utils : desktop.core
summary    :
    - Small-footprint color management engine
    - utils : Small-footprint color management engine - Utilities
description: |
    The Little Color Management System is a small-footprint color management engine, with special focus on accuracy and performance. It uses the International Color Consortium standard (ICC), which is the modern standard for color management.
emul32     : true
builddeps  :
    - pkgconfig(libtiff-4)
setup      : |
    if [ -n "${EMUL32BUILD+set}" ]; then
        depends_emul32=false
    else
        depends_emul32=true
    fi

    %meson_configure \
        -Dfastfloat=true \
        -Dthreaded=true \
        -Dutils=$depends_emul32
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
check      : |
    %ninja_check
patterns   :
    - utils :
        - /usr/bin/
        - /usr/share/man/man1
