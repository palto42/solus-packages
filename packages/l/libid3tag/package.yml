# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libid3tag
version    : 0.16.4
release    : 7
source     :
    - https://codeberg.org/tenacityteam/libid3tag/archive/0.16.4.tar.gz : ceb88ada1aa867c87c1d748a8aa40e68db5b0d2df636a9dab0ab1f7741d5e009
homepage   : https://github.com/tenacityteam/libid3tag
license    : GPL-2.0-or-later
component  : multimedia.library
summary    : Fork of the libid3tag library for reading ID3 metadata tags from MP3 files
description: |
    libid3tag is a library for reading and (eventually) writing ID3 tags, both ID3v1 and the various versions of ID3v2.
builddeps  :
    - gperf
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING COPYRIGHT
