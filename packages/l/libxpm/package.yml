# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libxpm
version    : 3.5.19
release    : 15
source     :
    - https://www.x.org/releases/individual/lib/libXpm-3.5.19.tar.xz : ad3576d689221a39dc728f0e0dc02ca7bb6a0d724c9a77fd1bfa1e9af83be900
homepage   : https://gitlab.freedesktop.org/xorg/lib/libxpm
license    : MIT
summary    : X Pixmap (XPM) image file format library
component  : xorg.library
builddeps  :
    - pkgconfig32(glib-2.0)  #check
    - pkgconfig32(x11)
emul32     : true
optimize   : speed
description: |
    libXpm provides support and common operations for the XPM pixmap format, which is commonly used in legacy X applications. XPM is an extension of the monochrome XBM bitmap specified in the X protocol.
setup      : |
    %configure \
        --disable-open-zfile \
        --disable-static \
        --enable-unit-tests
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
check      : |
    %make check
