# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : lsp-plugins
version    : 1.2.29
release    : 21
source     :
    - https://github.com/sadko4u/lsp-plugins/releases/download/1.2.29/lsp-plugins-src-1.2.29.tar.gz : 404297c3add879c508db06d5119e11efc1d0473527d2a69ed39ec77c1d1972f2
homepage   : https://lsp-plug.in
license    : LGPL-3.0-only
component  : multimedia.audio
summary    : Linux Studio Plugins Project
description: |
    LSP (Linux Studio Plugins) is a collection of open-source plugins
builddeps  :
    - pkgconfig(cairo)
    - pkgconfig(gl)
    - pkgconfig(jack)
    - pkgconfig(lv2)
    - pkgconfig(sndfile)
    - pkgconfig(xrandr)
    - ladspa-devel
setup      : |
    make config FEATURES='ladspa lv2 vst2 jack' PREFIX=/usr LIBDIR=%libdir%
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING COPYING.LESSER
