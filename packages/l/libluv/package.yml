# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libluv
version    : 1.52.1
release    : 13
source     :
    - https://github.com/luvit/luv/releases/download/1.52.1-0/luv-1.52.1-0.tar.gz : 3e6eb820a3aee034f85f9cce9bd77b5d42f34d128a1ccec877adf28c913577c7
homepage   : https://github.com/luvit/luv
license    : Apache-2.0
component  : programming
summary    : Bare libuv bindings for lua
description: |
    Makes libuv available to lua scripts. It was made for the luvit project but should usable from nearly any lua project.
builddeps  :
    - pkgconfig(libuv)
    - pkgconfig(luajit)
setup      : |
    %cmake_ninja \
      -DBUILD_MODULE=OFF \
      -DBUILD_SHARED_LIBS=ON \
      -DLUA_BUILD_TYPE=System \
      -DWITH_SHARED_LIBUV=ON
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE.txt
