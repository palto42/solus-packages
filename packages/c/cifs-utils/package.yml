# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : cifs-utils
version    : '7.5'
release    : 22
source     :
    - https://www.samba.org/ftp/linux-cifs/cifs-utils/cifs-utils-7.5.tar.bz2 : 7face85e3d2d5eb5e7adbd181adee6759097f135b10d6fb30be8e070af7e7054
homepage   : https://wiki.samba.org/index.php/LinuxCIFS_utils
license    : GPL-3.0-only
component  : network.utils
summary    : CIFS Filesystem Utilities
description: |
    Utilities for doing and managing mounts of the Linux CIFS filesystem.
builddeps  :
    - pkgconfig(keyutils)
    - pkgconfig(krb5)
    - pkgconfig(libcap-ng)
    - pkgconfig(smbclient)
    - pkgconfig(talloc)
    - python-docutils
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install ROOTSBINDIR=/usr/sbin
    %install_license COPYING
