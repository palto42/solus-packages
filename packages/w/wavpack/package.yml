# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : wavpack
version    : 5.9.0
release    : 15
source     :
    - https://github.com/dbry/WavPack/releases/download/5.9.0/wavpack-5.9.0.tar.xz : b5291bc4e6d69ebbd3da3800c5bf4a70f19bb92679b23e09b3b612c1e648d1ff
homepage   : https://www.wavpack.com
license    : BSD-3-Clause
component  :
    - multimedia.codecs
    - utils :
        - multimedia.codecs
summary    : WavPack audio compression tools
description: |
    WavPack is a completely open audio compression format providing lossless, high-quality lossy, and a unique hybrid compression mode.
setup      : |
    %configure --disable-static
build      : |
    %make
install    : |
    %make_install
    rm -rf $installdir/usr/share/doc
    %install_license COPYING
patterns   :
    - utils :
        - /usr/bin
        - /usr/share/man/man1
